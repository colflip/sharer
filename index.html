<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ScreenCast | 极简投屏</title>
    <link rel="icon" href="assets/img/logo.svg" type="image/svg+xml">
    <link rel="preconnect" href="https://download.agora.io">
    <link rel="stylesheet" href="assets/css/viewer.css">
</head>

<body>
    <div id="login-screen">
        <div class="login-box">
            <h2 class="login-title">ScreenCast <br><span class="login-subtitle">输入邀请码加入投屏</span></h2>
            <div id="share-note"></div>
            <input type="tel" id="pwdInput" placeholder="····" maxlength="4" autocomplete="off">
            <button id="enterBtn">确认进入</button>
            <div id="error-msg"></div>
        </div>
    </div>

    <div id="video-container">
        <div id="status-bar">等待画面连接...</div>
        <div id="video-note"></div>
        <div id="player"></div>
    </div>
    <script src="assets/js/config.js"></script>
    <script src="assets/js/agora-loader.js"></script>
    <script src="assets/js/viewer.js"></script>
</body>

</html>
