<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ScreenCast | 极简投屏</title>
    <link rel="preconnect" href="https://download.agora.io">
    <style>
        body {
            margin: 0;
            background: #000;
            color: white;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        #login-screen {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            background: #111;
        }

        .login-box {
            width: 100%;
            max-width: 320px;
            text-align: center;
        }

        h2 { margin-bottom: 30px; font-weight: 400; }

        input {
            width: 100%;
            padding: 15px;
            font-size: 24px;
            letter-spacing: 12px;
            text-align: center;
            background: #2c2c2e;
            border: 1px solid #3a3a3c;
            color: #fff;
            border-radius: 12px;
            outline: none;
            box-sizing: border-box;
        }

        input:focus { border-color: #007aff; }

        button {
            width: 100%;
            margin-top: 20px;
            padding: 15px;
            font-size: 18px;
            font-weight: 600;
            background: #007aff;
            border: none;
            color: white;
            border-radius: 12px;
            cursor: pointer;
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        #video-container {
            display: none;
            position: relative;
            flex: 1;
            background: #000;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: contain; /* 保持 iOS 屏幕比例 */
        }

        #status-bar {
            position: absolute;
            top: 0;
            width: 100%;
            background: rgba(0,0,0,0.5);
            padding: 10px;
            font-size: 12px;
            color: #ccc;
            text-align: center;
            z-index: 10;
        }

        #error-msg {
            color: #ff453a;
            font-size: 14px;
            margin-top: 15px;
            min-height: 20px;
        }

        #share-note {
            display: none;
            margin: -20px 0 22px;
            padding: 12px 14px;
            background: #1c1c1e;
            border-left: 4px solid #007aff;
            border-radius: 10px;
            color: #d8ecff;
            font-size: 14px;
            line-height: 1.5;
            text-align: left;
            white-space: pre-wrap;
            word-break: break-word;
        }

        #video-note {
            display: none;
            position: absolute;
            top: 44px;
            left: 12px;
            right: 12px;
            z-index: 11;
            padding: 10px 12px;
            background: rgba(28, 28, 30, 0.88);
            border-left: 4px solid #007aff;
            border-radius: 10px;
            color: #d8ecff;
            font-size: 13px;
            line-height: 1.5;
            white-space: pre-wrap;
            word-break: break-word;
            backdrop-filter: blur(8px);
        }
    </style>
</head>

<body>
    <div id="login-screen">
        <div class="login-box">
            <h2 style="margin-bottom: 40px; color: #fff;">ScreenCast <br><span style="font-size: 16px; color: #8e8e93;">输入邀请码加入投屏</span></h2>
            <div id="share-note"></div>
            <input type="tel" id="pwdInput" placeholder="····" maxlength="4" autocomplete="off">
            <button id="enterBtn">确认进入</button>
            <div id="error-msg"></div>
        </div>
    </div>

    <div id="video-container">
        <div id="status-bar">等待画面连接...</div>
        <div id="video-note"></div>
        <div id="player" style="width:100%; height:100%;"></div>
    </div>

    <script>
        const AGORA_SDK_SOURCES = [
            "vendor/AgoraRTC_N-4.23.1.js",
            "https://download.agora.io/sdk/release/AgoraRTC_N-4.23.1.js"
        ];
        let agoraSdkPromise = null;

        function loadScriptWithTimeout(src, timeoutMs = 9000) {
            return new Promise((resolve, reject) => {
                const script = document.createElement("script");
                let settled = false;
                const timer = setTimeout(() => {
                    fail(new Error("加载超时"));
                }, timeoutMs);

                function finish() {
                    if (settled) return;
                    settled = true;
                    clearTimeout(timer);
                    resolve();
                }

                function fail(err) {
                    if (settled) return;
                    settled = true;
                    clearTimeout(timer);
                    script.remove();
                    reject(err);
                }

                script.src = src;
                script.async = true;
                script.onload = finish;
                script.onerror = () => fail(new Error("加载失败"));
                document.head.appendChild(script);
            });
        }

        async function ensureAgoraSdk() {
            if (window.AgoraRTC) return window.AgoraRTC;
            if (!agoraSdkPromise) {
                agoraSdkPromise = (async () => {
                    for (const src of AGORA_SDK_SOURCES) {
                        try {
                            await loadScriptWithTimeout(src);
                            if (window.AgoraRTC) return window.AgoraRTC;
                        } catch (err) {
                            console.warn("Agora SDK 加载失败:", src, err);
                        }
                    }
                    throw new Error("投屏组件加载失败，请刷新页面或切换网络后重试");
                })();
            }
            return agoraSdkPromise;
        }

        // 增强版设备信息获取
        function getExtendedDeviceInfo() {
            const ua = navigator.userAgent;
            
            // 1. 平台与浏览器 (核心标识)
            let platform = "Other";
            if (/iPhone|iPad|iPod/i.test(ua)) platform = "iOS";
            else if (/Android/i.test(ua)) platform = "Android";
            else if (/Mac OS X/i.test(ua)) platform = "Mac";
            else if (/Windows/i.test(ua)) platform = "Win";

            let browser = "Browser";
            if (/MicroMessenger/i.test(ua)) browser = "WX";
            else if (/Chrome/i.test(ua)) browser = "Chrome";
            else if (/Safari/i.test(ua) && !/Chrome/i.test(ua)) browser = "Safari";
            else if (/Firefox/i.test(ua)) browser = "Firefox";
            const osBrowser = `${platform}_${browser}`;

            // 2. 屏幕属性
            const res = `${window.screen.width}x${window.screen.height}`;
            const dpr = window.devicePixelRatio || 1;

            // 3. 网络状况 (部分浏览器支持)
            let net = "unknown";
            if (navigator.connection) {
                net = navigator.connection.effectiveType || "unknown";
            }

            // 4. 语言与主题
            const lang = (navigator.language || "zh").split('-')[0]; // 取简码如 zh, en
            const theme = window.matchMedia('(prefers-color-scheme: dark)').matches ? "dark" : "light";

            // 5. 持久化 Unique ID 与 访问次数 (存储在 localStorage)
            let uid = localStorage.getItem('sc_uid');
            if (!uid) {
                uid = Math.random().toString(36).substring(2, 8);
                localStorage.setItem('sc_uid', uid);
            }
            
            let visits = parseInt(localStorage.getItem('sc_visits') || '0') + 1;
            localStorage.setItem('sc_visits', visits.toString());

            // 6. 简易指纹 (UA + 分辨率 + 时区 + 语言)
            const fpData = `${ua}|${res}|${new Date().getTimezoneOffset()}|${lang}`;
            let hash = 0;
            for (let i = 0; i < fpData.length; i++) {
                hash = ((hash << 5) - hash) + fpData.charCodeAt(i);
                hash |= 0;
            }
            const fingerprint = Math.abs(hash).toString(36);

            return { osBrowser, res, dpr, net, lang, theme, uid, fingerprint, visits };
        }

        const APP_ID = "15b593b2d51e4017bc1c684201630356";
        
        // 监听 URL 变化：解决同一窗口下重新打开链接不刷新的问题
        window.addEventListener("hashchange", () => {
            window.location.reload();
        });

        // 从 Hash 解析 room 参数 (例如 #room=io8gvd)
        const getHashParam = (name) => {
            const hash = window.location.hash.substring(1);
            const params = new URLSearchParams(hash);
            return params.get(name);
        };
        const roomId = getHashParam('room');
        const sharePrompt = getHashParam('msg') || "";

        if (!roomId) {
            document.body.innerHTML = '<div style="padding:50px; text-align:center;"><h2>❌ 链接无效</h2><p>请重新获取分享链接</p></div>';
            throw new Error("Missing room id");
        }

        if (sharePrompt) {
            const shareNoteEl = document.getElementById('share-note');
            shareNoteEl.innerText = sharePrompt;
            shareNoteEl.style.display = 'block';
        }

        function showVideoPrompt() {
            if (!sharePrompt) return;
            const videoNoteEl = document.getElementById('video-note');
            videoNoteEl.innerText = sharePrompt;
            videoNoteEl.style.display = 'block';
            clearTimeout(showVideoPrompt.timer);
            showVideoPrompt.timer = setTimeout(() => {
                videoNoteEl.style.display = 'none';
            }, 6000);
        }

        // 4 位邀请码自动进入逻辑
        document.getElementById('pwdInput').addEventListener('input', function() {
            if (this.value.length === 4) {
                document.getElementById('enterBtn').click();
            }
        });

        document.getElementById('enterBtn').onclick = async () => {
            const enterBtn = document.getElementById('enterBtn');
            const pwd = document.getElementById('pwdInput').value.trim();
            const errorMsg = document.getElementById('error-msg');

            if (pwd.length !== 4) {
                errorMsg.innerText = "请输入 4 位数字密码";
                return;
            }

            // 切换 UI
            enterBtn.disabled = true;
            errorMsg.innerText = "";
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('video-container').style.display = 'block';
            const statusBar = document.getElementById('status-bar');
            statusBar.style.display = "block";
            statusBar.innerText = "正在加载投屏组件...";
            showVideoPrompt();

            try {
                await ensureAgoraSdk();
                const client = AgoraRTC.createClient({ mode: "rtc", codec: "vp8" });
                // 构造与分享端一致的频道名
                const channel = `iosshare-${roomId}-${pwd}`;

                client.on("connection-state-change", (curState, prevState, reason) => {
                    console.log("连接状态:", prevState, "->", curState, reason || "");
                    if (curState === "CONNECTING") {
                        statusBar.style.display = "block";
                        statusBar.innerText = "正在连接...";
                    } else if (curState === "RECONNECTING") {
                        statusBar.style.display = "block";
                        statusBar.innerText = "🟡 网络波动，正在重连...";
                    } else if (curState === "FAILED") {
                        statusBar.style.display = "block";
                        statusBar.innerText = "🔴 连接失败，请刷新或切换网络后重试";
                    }
                });
                
                // 将增强的设备信息编码进 UID (格式: viewer|平台_浏览器|分辨率|DPR|网络|语言|主题|UID|指纹|访问次数)
                const info = getExtendedDeviceInfo();
                const viewerUid = `viewer|${info.osBrowser}|${info.res}|${info.dpr}|${info.net}|${info.lang}|${info.theme}|${info.uid}|${info.fingerprint}|${info.visits}`;

                await client.join(APP_ID, channel, null, viewerUid);
                statusBar.innerText = "已进入房间，等待画面...";

                // 无后端状态探测：弱网下给足等待时间，避免误判为密码错误或分享已结束
                setTimeout(async () => {
                    if (client.remoteUsers.length === 0) {
                        errorMsg.innerText = "🔇 邀请码错误或分享已结束";
                        await client.leave();
                        // 恢复登录界面并清空输入
                        document.getElementById('login-screen').style.display = 'flex';
                        document.getElementById('video-container').style.display = 'none';
                        document.getElementById('pwdInput').value = "";
                        document.getElementById('pwdInput').focus();
                        enterBtn.disabled = false;
                    }
                }, 8000);

                client.on("user-published", async (user, mediaType) => {
                    if (mediaType === "video") {
                        statusBar.innerText = "正在加载画面...";
                        const remoteTrack = await client.subscribe(user, mediaType);
                        remoteTrack.play("player");
                        // 播放成功后隐藏顶部的状态栏
                        statusBar.style.display = "none";
                    }
                });

                client.on("user-unpublished", (user, mediaType) => {
                    if (mediaType === "video") {
                        statusBar.style.display = "block";
                        statusBar.innerText = "🔴 分享者已停止共享";
                        document.getElementById("player").innerHTML = "";
                    }
                });

                client.on("peer-leave", () => {
                   statusBar.style.display = "block";
                   statusBar.innerText = "🔴 分享者已离开";
                });

            } catch (e) {
                console.error(e);
                errorMsg.innerText = e.message || "进入失败：可能密码错误或连接超时";
                document.getElementById('login-screen').style.display = 'flex';
                document.getElementById('video-container').style.display = 'none';
                enterBtn.disabled = false;
                document.getElementById('pwdInput').focus();
            }
        };

        // 自动聚焦 & 自动登录
        window.onload = () => {
            const pwdInput = document.getElementById('pwdInput');
            const urlPwd = getHashParam('pwd');
            
            if (urlPwd && urlPwd.length === 4) {
                pwdInput.value = urlPwd;
                // 延迟一小下确保 UI 已就绪（可选，但更稳健）
                setTimeout(() => {
                    document.getElementById('enterBtn').click();
                }, 100);
            } else {
                pwdInput.focus();
            }
        };
    </script>
</body>

</html>
