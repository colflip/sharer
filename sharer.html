<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ScreenCast | 极简投屏</title>
    <link rel="preconnect" href="https://download.agora.io">
    <link rel="stylesheet" href="assets/css/sharer.css">
</head>

<body>
    <div class="container">
        <h2>ScreenCast <span class="app-subtitle">| 极简投屏</span></h2>

        <div class="guide guide-steps">
            <p class="guide-title">操作指引：</p>
            <ol class="guide-list">
                <li>点击下方 <b>"发起投屏"</b> 按钮，浏览器会自动弹出窗口选择列表。</li>
                <li>在弹窗中切换到 <b>"标签页"</b>、<b>"窗口"</b> 或 <b>"整个屏幕"</b>。</li>
                <li>选择您想分享的内容并点击 <b>"分享"</b> 即可开始。</li>
            </ol>
        </div>

        <div class="segmented-control" id="qualitySelector">
            <div class="control-item" data-q="fluent">540P</div>
            <div class="control-item" data-q="standard">720P</div>
            <div class="control-item" data-q="high">1K</div>
            <div class="control-item active" data-q="pro_2k">2K</div>
            <div class="control-item" data-q="pro_4k">4K</div>
        </div>

        <div class="segmented-control" id="durationSelector">
            <div class="control-item" data-v="5">5m</div>
            <div class="control-item active" data-v="15">15m</div>
            <div class="control-item" data-v="40">40m</div>
            <div class="control-item" data-v="60">1h</div>
            <div class="control-item" data-v="0">不限时长</div>
            <div class="control-item" data-v="custom">自定义</div>
        </div>

        <div id="customDurationBox">
            <input type="number" id="customMinutesInput" placeholder="请输入自定义分钟数" min="1" max="1440">
        </div>

        <div class="field-block">
            <label for="sharePromptInput">分享链接提示语</label>
            <textarea id="sharePromptInput" maxlength="120" placeholder="例如：请用手机浏览器打开，会议结束后可直接关闭页面。"></textarea>
        </div>

        <div class="share-actions">
            <button id="generateBtn" type="button">发起投屏</button>
            <button id="pauseBtn" type="button">暂停投屏</button>
        </div>
        <div id="status">准备就绪</div>

        <div id="shareInfo">
            <div class="info-card">
                <p class="share-success">✅ 分享已开启</p>
                <div id="urlContainer" class="url-box"></div>
                <div id="promptPreview" class="prompt-preview"></div>
                <button class="copy-btn" id="copyUrl">复制完整信息</button>
                <div id="copyToast" class="copy-toast"></div>
            </div>
        </div>

        <div id="viewerList" class="viewer-panel">
            <div class="panel-header">
                <h3>实时访客状态</h3>
                <button class="mini-btn" data-toggle-panel="viewerList" type="button">收起</button>
            </div>
            <div id="viewersContainer" class="panel-body"></div>
        </div>

        <div id="viewerRecordPanel" class="viewer-panel">
            <div id="recordsContainer" class="panel-body"></div>
        </div>
    </div>
    <script src="assets/js/config.js"></script>
    <script src="assets/js/agora-loader.js"></script>
    <script src="assets/js/sharer.js"></script>
</body>

</html>
