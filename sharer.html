<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ScreenCast | 极简投屏</title>
    <style>
        body {
            margin: 0;
            background: #111;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
        }

        .container {
            width: 100%;
            max-width: 600px;
            background: #1c1c1e;
            padding: 40px 40px;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            text-align: center;
        }

        h2 {
            margin-top: 0;
            margin-bottom: 30px;
            font-size: 24px;
            letter-spacing: -0.5px;
            color: #007aff;
        }

        .guide {
            text-align: left;
            background: #2c2c2e;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 25px;
            font-size: 14px;
            line-height: 1.6;
            color: #ccc;
        }

        .guide b {
            color: #fff;
        }

        #generateBtn {
            width: 100%;
            font-size: 18px;
            font-weight: 600;
            padding: 15px;
            background: #007aff;
            border: none;
            color: white;
            border-radius: 12px;
            cursor: pointer;
            transition: 0.2s;
        }

        #generateBtn:hover {
            background: #0056b3;
        }

        #generateBtn.active {
            background: #ff453a; /* 醒目的红色，提示停止 */
        }

        #generateBtn.active:hover {
            background: #d73a2f;
        }

        #shareInfo {
            display: none;
            margin-top: 30px;
            text-align: left;
            word-break: break-all;
        }

        .info-card {
            background: #2c2c2e;
            padding: 20px;
            border-radius: 12px;
            border-left: 4px solid #34c759;
        }

        .copy-btn {
            margin-top: 10px;
            padding: 8px 15px;
            background: #3a3a3c;
            border: none;
            color: #007aff;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
        }

        #status {
            margin-top: 15px;
            font-size: 14px;
            color: #8e8e93;
        }

        .viewer-panel {
            margin-top: 20px;
            padding: 15px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            text-align: left;
            display: none;
        }

        .viewer-panel h3 {
            margin: 0 0 10px 0;
            font-size: 14px;
            color: #8e8e93;
            font-weight: 500;
        }

        .viewer-item {
            font-size: 12px;
            padding: 10px 15px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            align-items: center;
            gap: 10px;
            overflow-x: auto;
            /* 支持横向滚动查看更多标签 */
            scrollbar-width: none;
            /* 隐藏滚动条 */
        }

        .viewer-item::-webkit-scrollbar {
            display: none;
        }

        .viewer-item:last-child {
            border-bottom: none;
        }

        .viewer-main {
            display: flex;
            align-items: center;
            flex-shrink: 0;
            margin-right: 5px;
        }

        .viewer-item .dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #34c759;
            margin-right: 8px;
        }

        .viewer-details {
            display: flex;
            align-items: center;
            gap: 6px;
            flex-shrink: 0;
        }

        .tag {
            padding: 2px 6px;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 4px;
            font-size: 10px;
            color: #999;
            white-space: nowrap;
        }

        .tag-uid {
            background: rgba(0, 122, 255, 0.15);
            color: #007aff;
        }

        .tag-visits {
            background: rgba(255, 55, 95, 0.15);
            color: #ff375f;
            font-weight: bold;
        }

        .tag-net {
            background: rgba(52, 199, 89, 0.15);
            color: #34c759;
        }

        .tag-res {
            background: rgba(255, 159, 10, 0.15);
            color: #ff9f0a;
        }

        /* 统一分段选择器样式 */
        .segmented-control {
            display: flex;
            background: rgba(255, 255, 255, 0.05);
            padding: 4px;
            border-radius: 14px;
            margin-bottom: 24px;
            justify-content: center;
        }

        .control-item {
            flex: 1;
            padding: 12px 0;
            text-align: center;
            font-size: 14px;
            cursor: pointer;
            border-radius: 10px;
            color: #8e8e93;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .control-item.active {
            background: #3a3a3c;
            color: #007aff;
            font-weight: 600;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
        }

        #customDurationBox {
            margin-bottom: 24px;
            display: none;
        }

        #customDurationBox input {
            width: 100%;
            padding: 14px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #fff;
            border-radius: 12px;
            font-size: 15px;
            outline: none;
            box-sizing: border-box;
            text-align: center;
        }
    </style>
</head>

<body>
    <div class="container">
        <h2>ScreenCast <span style="font-size: 16px; color: #8e8e93; font-weight: normal;">| 极简投屏</span></h2>

        <div class="guide" style="background: transparent; padding: 0; margin-bottom: 40px; text-align: left;">
            <p style="color: #fff; font-size: 15px; margin-top: 0; margin-bottom: 16px; font-weight: 500;">操作指引：</p>
            <ol style="color: #8e8e93; font-size: 14px; margin: 0; padding-left: 20px; line-height: 1.8;">
                <li>点击下方按钮，浏览器会自动弹出窗口选择列表。</li>
                <li>在弹窗中切换到 <b>"标签页"</b>、<b>"窗口"</b> 或 <b>"整个屏幕"</b>。</li>
                <li>选择您想分享的内容并点击 <b>"分享"</b> 即可开始。</li>
            </ol>
        </div>

        <div class="segmented-control" id="qualitySelector">
            <div class="control-item" data-q="fluent">540P</div>
            <div class="control-item active" data-q="standard">720P</div>
            <div class="control-item" data-q="high">1080P</div>
            <div class="control-item" data-q="pro_2k">2K</div>
        </div>

        <div class="segmented-control" id="durationSelector">
            <div class="control-item" data-v="5">5m</div>
            <div class="control-item active" data-v="20">20m</div>
            <div class="control-item" data-v="60">1h</div>
            <div class="control-item" data-v="0">不限时长</div>
            <div class="control-item" data-v="custom">自定义</div>
        </div>

        <div id="customDurationBox">
            <input type="number" id="customMinutesInput" placeholder="请输入自定义分钟数" min="1" max="1440">
        </div>

        <button id="generateBtn" style="margin-top: 5px;">发起投屏</button>
        <div id="status">准备就绪</div>

        <div id="shareInfo">
            <div class="info-card">
                <p style="margin:0 0 10px 0; color:#34c759; font-weight:bold;">✅ 分享已开启</p>
                <div id="urlContainer"
                    style="font-size:14px; background:#111; padding:10px; border-radius:6px; margin-bottom:10px;"></div>
                <p style="margin:5px 0;">密码：<b id="pwdCode" style="font-size:24px; color:#fff;"></b></p>
                <button class="copy-btn" id="copyUrl">复制完整信息</button>
            </div>
        </div>

        <div id="viewerList" class="viewer-panel">
            <h3>实时访客状态</h3>
            <div id="viewersContainer"></div>
        </div>
    </div>

    <script src="https://download.agora.io/sdk/release/AgoraRTC_N-4.23.1.js"></script>
    <script>
        const APP_ID = "15b593b2d51e4017bc1c684201630356";
        let client, screenTrack;
        let countdownTimer = null; // 全局定时器引用
        let totalSecondsRemaining = 0; // 全局剩余秒数

        // 清晰度配置项 (升级版)
        const QUALITY_CONFIGS = {
            fluent: { width: 960, height: 540, frameRate: 15, bitrateMin: 500, bitrateMax: 1000 },
            standard: { width: 1280, height: 720, frameRate: 25, bitrateMin: 800, bitrateMax: 2000 },
            high: { width: 1920, height: 1080, frameRate: 30, bitrateMin: 1500, bitrateMax: 4000 },
            ultra: { width: 1920, height: 1080, frameRate: 60, bitrateMin: 2000, bitrateMax: 8000 },
            pro_2k: { width: 2560, height: 1440, frameRate: 30, bitrateMin: 3000, bitrateMax: 10000 }
        };
        let selectedQuality = "standard";

        // 清晰度选择逻辑
        document.querySelectorAll('#qualitySelector .control-item').forEach(item => {
            item.onclick = async () => {
                if (document.getElementById('generateBtn').disabled && !screenTrack) return; // 只有在未开始投屏时才禁用
                document.querySelectorAll('#qualitySelector .control-item').forEach(i => i.classList.remove('active'));
                item.classList.add('active');
                selectedQuality = item.getAttribute('data-q');

                // 如果正在投屏，动态应用新配置
                if (screenTrack) {
                    const config = QUALITY_CONFIGS[selectedQuality];
                    try {
                        await screenTrack.setEncoderConfiguration({
                            width: config.width,
                            height: config.height,
                            frameRate: config.frameRate,
                            bitrateMin: config.bitrateMin,
                            bitrateMax: config.bitrateMax
                        });
                        console.log("清晰度已动态切换为:", selectedQuality);
                    } catch (e) {
                        console.error("动态切换清晰度失败:", e);
                    }
                }
            };
        });

        // 时长选择逻辑
        let selectedDuration = 20;
        document.querySelectorAll('#durationSelector .control-item').forEach(item => {
            item.onclick = () => {
                if (document.getElementById('generateBtn').disabled && !screenTrack) return; // 只有在未开始投屏时才禁用
                document.querySelectorAll('#durationSelector .control-item').forEach(i => i.classList.remove('active'));
                item.classList.add('active');
                
                const val = item.getAttribute('data-v');
                if (val === 'custom') {
                    document.getElementById('customDurationBox').style.display = 'block';
                    selectedDuration = -1;
                } else {
                    document.getElementById('customDurationBox').style.display = 'none';
                    selectedDuration = parseInt(val);
                }

                // 如果正在投屏，动态更新/开启剩余时长
                if (client && client.connectionState === "CONNECTED") {
                    let newLimit = 0;
                    if (selectedDuration === -1) {
                        newLimit = parseInt(document.getElementById('customMinutesInput').value) || 30;
                    } else {
                        newLimit = selectedDuration;
                    }
                    
                    if (newLimit > 0) {
                        totalSecondsRemaining = newLimit * 60;
                        if (!countdownTimer) {
                            startCountdown(); // 重新启动计时器
                        }
                        console.log("时长已动态调整为:", newLimit, "分钟");
                    } else {
                        // 不限时长，清除定时器
                        if (countdownTimer) {
                            clearInterval(countdownTimer);
                            countdownTimer = null;
                        }
                        document.getElementById('status').innerText = "🟢 分享中 - 不限时长";
                    }
                }
            };
        });

        // 封装倒计时启动逻辑
        function startCountdown() {
            if (countdownTimer) clearInterval(countdownTimer);
            countdownTimer = setInterval(() => {
                totalSecondsRemaining--;
                if (totalSecondsRemaining <= 0) {
                    clearInterval(countdownTimer);
                    countdownTimer = null;
                    alert("分享时间已到，投屏已自动结束。");
                    window.location.reload();
                }
                const h = String(Math.floor(totalSecondsRemaining / 3600)).padStart(2, '0');
                const m = String(Math.floor((totalSecondsRemaining % 3600) / 60)).padStart(2, '0');
                const s = String(totalSecondsRemaining % 60).padStart(2, '0');
                document.getElementById('status').innerText = `🟢 分享中 - 剩余时间 ${h}:${m}:${s}`;
            }, 1000);
        }

        // 自定义时长输入动态更新逻辑
        document.getElementById('customMinutesInput').addEventListener('input', function() {
            if (countdownTimer && selectedDuration === -1) {
                const newLimit = parseInt(this.value);
                if (newLimit > 0) {
                    totalSecondsRemaining = newLimit * 60;
                }
            }
        });

        document.getElementById('generateBtn').onclick = async () => {
            const btn = document.getElementById('generateBtn');
            const status = document.getElementById('status');

            // 环境检测：防止用户在本地打开文件时生成错误的本地链接
            if (window.location.protocol === 'file:') {
                alert("🔴 检测到您正在打开本地文件！\n\n请先访问您部署在 Render 的域名地址（例如 https://xxx.onrender.com/sharer.html），从线上页面点击分享，否则生成的链接别人无法打开。");
                return;
            }

            // 生成 4 位密码和随机房间 ID
            const password = String(Math.floor(1000 + Math.random() * 9000));
            const roomId = Math.random().toString(36).substring(7);
            const channel = `iosshare-${roomId}-${password}`;

            try {
                btn.disabled = true;
                status.innerText = "正在请求共享权限...";

                client = AgoraRTC.createClient({ mode: "rtc", codec: "vp8" });

                // 应用选中的清晰度配置 (开启 detail 模式优化画质)
                const config = QUALITY_CONFIGS[selectedQuality];
                
                try {
                    screenTrack = await AgoraRTC.createScreenVideoTrack({
                        optimizationMode: "detail", // 优先保障文字细节
                        encoderConfig: {
                            width: config.width,
                            height: config.height,
                            frameRate: config.frameRate,
                            bitrateMin: config.bitrateMin,
                            bitrateMax: config.bitrateMax
                        }
                    }, "auto");
                } catch (trackError) {
                    console.error("Track Error:", trackError);
                    let msg = "权限请求失败";
                    if (trackError.code === "PERMISSION_DENIED") msg = "未获得屏幕共享权限，请点击允许";
                    else if (trackError.message?.includes("Could not get display media")) msg = "浏览器由于硬件压力或安全策略拒绝了请求";
                    throw new Error(msg);
                }

                await client.join(APP_ID, channel, null, "sharer");
                await client.publish(screenTrack);

                // 生成观看链接 (自适应当前部署域名，全网通用)
                const baseUrl = window.location.origin + window.location.pathname.replace('sharer.html', '');
                const watchUrl = `${baseUrl}index.html#room=${roomId}`;

                document.getElementById('urlContainer').innerText = watchUrl;
                document.getElementById('pwdCode').innerText = password;
                document.getElementById('shareInfo').style.display = 'block';
                document.getElementById('viewerList').style.display = 'block';

                status.innerText = "🟢 分享中 - 请勿关闭此页面";

                // ===== 倒计时初始化 =====
                let limitMinutes = 0;
                if (selectedDuration === -1) {
                    limitMinutes = parseInt(document.getElementById('customMinutesInput').value) || 30;
                } else {
                    limitMinutes = selectedDuration;
                }

                if (limitMinutes > 0) {
                    totalSecondsRemaining = limitMinutes * 60;
                    startCountdown();
                } else {
                    document.getElementById('status').innerText = "🟢 分享中 - 不限时长";
                }

                btn.innerText = "停止投屏";
                btn.classList.add('active'); // 借用 active 样式使其变红或区分
                btn.onclick = async () => {
                    await cleanup();
                    window.location.reload(); // 目前依然建议 reload 以确保 UI 状态完全重置
                };
                btn.disabled = false;

                document.getElementById('copyUrl').onclick = () => {
                    const text = `使用浏览器打开，加入我的投屏：\n${watchUrl}\n\n邀请码：${password}`;
                    navigator.clipboard.writeText(text);
                    alert("邀请信息已复制");
                };

                // ===== 观众状态监听与透传解析 =====
                const viewersContainer = document.getElementById('viewersContainer');

                client.on("user-joined", (user) => {
                    // 如果 UID 不是通过我们特定编码格式传入的，则跳过
                    if (typeof user.uid !== 'string' || !user.uid.startsWith("viewer|")) return;

                    const p = user.uid.split("|");
                    // 格式: viewer|osBrowser|res|dpr|net|lang|theme|uid|fingerprint|visits
                    const info = {
                        osBrowser: p[1] || "未知",
                        res: p[2] || "未知",
                        dpr: p[3] || "1",
                        net: p[4] || "未知",
                        lang: p[5] || "zh",
                        theme: p[6] || "light",
                        uid: p[7] || "N/A",
                        fp: p[8] || "N/A",
                        visits: p[9] || "1"
                    };

                    const el = document.createElement("div");
                    el.className = "viewer-item";
                    el.id = `viewer-${user.uid}`;
                    el.innerHTML = `
                        <div class="viewer-main">
                            <div class="dot"></div>
                            <b style="color:#fff; margin-right:5px;">${info.osBrowser}</b>
                        </div>
                        <div class="viewer-details">
                            <span class="tag tag-uid">ID: ${info.uid}</span>
                            <span class="tag tag-visits">第 ${info.visits} 次访问</span>
                            <span class="tag tag-res">${info.res} @${info.dpr}x</span>
                            <span class="tag tag-net">${info.net.toUpperCase()}</span>
                            <span class="tag">${info.lang.toUpperCase()}</span>
                            <span class="tag">${info.theme === 'dark' ? '🌙' : '☀️'}</span>
                            <span class="tag" title="指纹: ${info.fp}">FP: ${info.fp}</span>
                        </div>
                    `;

                    viewersContainer.appendChild(el);
                });

                client.on("user-left", (user) => {
                    if (typeof user.uid !== 'string' || !user.uid.startsWith("viewer|")) return;
                    const el = document.getElementById(`viewer-${user.uid}`);
                    if (el) el.remove();
                });

                // 监听停止共享（点击浏览器顶部的停止或关闭窗口）
                screenTrack.on("track-ended", () => {
                    window.location.reload();
                });

            } catch (err) {
                console.error("Share Error:", err);
                status.innerText = `🔴 分享失败: ${err.message || '系统繁忙，请刷新再试'}`;
                btn.disabled = false;
                if (screenTrack) {
                    screenTrack.stop();
                    screenTrack.close();
                }
                if (client) await client.leave().catch(() => {});
            }
        };

        // 统一资源回收逻辑
        async function cleanup() {
            if (screenTrack) {
                screenTrack.stop();
                screenTrack.close();
                screenTrack = null;
            }
            if (client) {
                await client.leave().catch(() => {});
                client = null;
            }
        }

        // 页面关闭/刷新前强制释放资源，防止崩溃或僵尸流
        window.onbeforeunload = () => {
            cleanup();
        };
    </script>
</body>

</html>
