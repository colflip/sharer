<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ScreenCast | 极简投屏</title>
    <link rel="preconnect" href="https://download.agora.io">
    <style>
        body {
            margin: 0;
            background: #111;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 30px 20px;
        }

        .container {
            width: 100%;
            max-width: 600px;
            background: #1c1c1e;
            padding: 35px 30px;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            text-align: center;
        }

        h2 {
            margin-top: 0;
            margin-bottom: 25px;
            font-size: 24px;
            letter-spacing: -0.5px;
            color: #007aff;
        }

        .guide {
            text-align: left;
            background: #2c2c2e;
            padding: 12px 15px;
            border-radius: 12px;
            margin-bottom: 20px;
            font-size: 14px;
            line-height: 1.6;
            color: #ccc;
        }

        .guide b {
            color: #fff;
        }

        #generateBtn {
            width: 100%;
            font-size: 18px;
            font-weight: 600;
            padding: 15px;
            background: #007aff;
            border: none;
            color: white;
            border-radius: 12px;
            cursor: pointer;
            transition: 0.2s;
        }

        #generateBtn:hover {
            background: #0056b3;
        }

        #generateBtn.active {
            background: #ff453a; /* 醒目的红色，提示停止 */
        }

        #generateBtn.active:hover {
            background: #d73a2f;
        }

        #shareInfo {
            display: none;
            margin-top: 15px;
            text-align: left;
            word-break: break-all;
        }

        .info-card {
            background: #2c2c2e;
            padding: 20px;
            border-radius: 12px;
            border-left: 4px solid #34c759;
        }

        .copy-btn {
            margin-top: 10px;
            padding: 8px 15px;
            background: #3a3a3c;
            border: none;
            color: #007aff;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
        }

        #status {
            margin-top: 15px;
            font-size: 14px;
            color: #8e8e93;
        }

        .viewer-panel {
            margin-top: 20px;
            padding: 15px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            text-align: left;
            display: none;
        }

        .viewer-panel h3 {
            margin: 0 0 10px 0;
            font-size: 14px;
            color: #8e8e93;
            font-weight: 500;
        }

        .viewer-item {
            font-size: 12px;
            padding: 10px 15px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            align-items: center;
            gap: 10px;
            overflow-x: auto;
            /* 支持横向滚动查看更多标签 */
            scrollbar-width: none;
            /* 隐藏滚动条 */
        }

        .viewer-item::-webkit-scrollbar {
            display: none;
        }

        .viewer-item:last-child {
            border-bottom: none;
        }

        .viewer-main {
            display: flex;
            align-items: center;
            flex-shrink: 0;
            margin-right: 5px;
        }

        .viewer-item .dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #34c759;
            margin-right: 8px;
        }

        .viewer-details {
            display: flex;
            align-items: center;
            gap: 6px;
            flex-shrink: 0;
        }

        .tag {
            padding: 2px 6px;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 4px;
            font-size: 10px;
            color: #999;
            white-space: nowrap;
        }

        .tag-uid {
            background: rgba(0, 122, 255, 0.15);
            color: #007aff;
        }

        .tag-visits {
            background: rgba(255, 55, 95, 0.15);
            color: #ff375f;
            font-weight: bold;
        }

        .tag-net {
            background: rgba(52, 199, 89, 0.15);
            color: #34c759;
        }

        .tag-res {
            background: rgba(255, 159, 10, 0.15);
            color: #ff9f0a;
        }

        /* 统一分段选择器样式 */
        .segmented-control {
            display: flex;
            background: rgba(255, 255, 255, 0.05);
            padding: 4px;
            border-radius: 14px;
            margin-bottom: 10px;
            justify-content: center;
        }

        .control-item {
            flex: 1;
            padding: 12px 0;
            text-align: center;
            font-size: 14px;
            cursor: pointer;
            border-radius: 10px;
            color: #8e8e93;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .control-item.active {
            background: #3a3a3c;
            color: #007aff;
            font-weight: 600;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
        }

        #customDurationBox {
            margin-bottom: 12px;
            display: none;
        }

        #customDurationBox input {
            width: 100%;
            padding: 14px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #fff;
            border-radius: 12px;
            font-size: 15px;
            outline: none;
            box-sizing: border-box;
            text-align: center;
        }

        .field-block {
            margin-bottom: 12px;
            text-align: left;
        }

        .field-block label {
            display: block;
            margin-bottom: 8px;
            color: #8e8e93;
            font-size: 13px;
            font-weight: 600;
        }

        #sharePromptInput {
            width: 100%;
            min-height: 68px;
            padding: 12px 14px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #fff;
            border-radius: 12px;
            font-size: 14px;
            line-height: 1.5;
            resize: vertical;
            outline: none;
            box-sizing: border-box;
        }

        #sharePromptInput:focus {
            border-color: #007aff;
        }

        #sharePromptInput:disabled {
            opacity: 0.65;
            cursor: not-allowed;
        }

        .prompt-preview {
            display: none;
            margin: 10px 0;
            padding: 10px;
            background: rgba(0, 122, 255, 0.12);
            border-radius: 8px;
            color: #d8ecff;
            font-size: 13px;
            line-height: 1.5;
            white-space: pre-wrap;
            word-break: break-word;
        }

        .panel-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            margin-bottom: 10px;
        }

        .panel-header h3 {
            margin: 0;
        }

        .mini-btn {
            padding: 5px 9px;
            background: rgba(255, 255, 255, 0.08);
            border: none;
            color: #8e8e93;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
        }

        .record-item {
            padding: 12px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
        }

        .record-item:last-child {
            border-bottom: none;
        }

        .record-title {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            margin-bottom: 8px;
            font-size: 13px;
        }

        .record-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }

        .record-times {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-top: 8px;
        }

        .empty-state {
            padding: 12px 0;
            color: #636366;
            font-size: 13px;
            text-align: center;
        }
    </style>
</head>

<body>
    <div class="container">
        <h2>ScreenCast <span style="font-size: 16px; color: #8e8e93; font-weight: normal;">| 极简投屏</span></h2>

        <div class="guide" style="background: transparent; padding: 0; margin-bottom: 25px; text-align: left;">
            <p style="color: #fff; font-size: 15px; margin-top: 0; margin-bottom: 12px; font-weight: 500;">操作指引：</p>
            <ol style="color: #8e8e93; font-size: 14px; margin: 0; padding-left: 20px; line-height: 1.75;">
                <li>点击下方按钮，浏览器会自动弹出窗口选择列表。</li>
                <li>在弹窗中切换到 <b>"标签页"</b>、<b>"窗口"</b> 或 <b>"整个屏幕"</b>。</li>
                <li>选择您想分享的内容并点击 <b>"分享"</b> 即可开始。</li>
            </ol>
        </div>

        <div class="segmented-control" id="qualitySelector">
            <div class="control-item" data-q="fluent">540P</div>
            <div class="control-item active" data-q="standard">720P</div>
            <div class="control-item" data-q="high">1080P</div>
            <div class="control-item" data-q="pro_2k">2K</div>
        </div>

        <div class="segmented-control" id="durationSelector">
            <div class="control-item" data-v="5">5m</div>
            <div class="control-item active" data-v="20">20m</div>
            <div class="control-item" data-v="60">1h</div>
            <div class="control-item" data-v="0">不限时长</div>
            <div class="control-item" data-v="custom">自定义</div>
        </div>

        <div id="customDurationBox">
            <input type="number" id="customMinutesInput" placeholder="请输入自定义分钟数" min="1" max="1440">
        </div>

        <div class="field-block">
            <label for="sharePromptInput">分享链接提示语</label>
            <textarea id="sharePromptInput" maxlength="120" placeholder="例如：请用手机浏览器打开，会议结束后可直接关闭页面。"></textarea>
        </div>

        <button id="generateBtn" style="margin-top: 5px;">发起投屏</button>
        <div id="status">准备就绪</div>

        <div id="shareInfo">
            <div class="info-card">
                <p style="margin:0 0 10px 0; color:#34c759; font-weight:bold;">✅ 分享已开启</p>
                <div id="urlContainer"
                    style="font-size:14px; background:#111; padding:10px; border-radius:6px; margin-bottom:10px;"></div>
                <p style="margin:5px 0;">密码：<b id="pwdCode" style="font-size:24px; color:#fff;"></b></p>
                <div id="promptPreview" class="prompt-preview"></div>
                <button class="copy-btn" id="copyUrl">复制完整信息</button>
            </div>
        </div>

        <div id="viewerList" class="viewer-panel">
            <h3>实时访客状态</h3>
            <div id="viewersContainer"></div>
        </div>

        <div id="viewerRecordPanel" class="viewer-panel">
            <div class="panel-header">
                <h3>设备记录</h3>
                <button class="mini-btn" id="clearRecordsBtn" type="button">清空</button>
            </div>
            <div id="recordsContainer"></div>
        </div>
    </div>

    <script src="https://download.agora.io/sdk/release/AgoraRTC_N-4.23.1.js"></script>
    <script>
        const APP_ID = "15b593b2d51e4017bc1c684201630356";
        let client, screenTrack;
        let countdownTimer = null; // 全局定时器引用
        let totalSecondsRemaining = 0; // 全局剩余秒数
        const DEFAULT_SHARE_PROMPT = "请使用浏览器打开链接，参加投屏";
        const SHARE_PROMPT_KEY = "sc_share_prompt";
        const LAST_RECORDS_KEY = "sc_latest_viewer_records_key";
        const VIEWER_RECORDS_CACHE_KEY = "sc_viewer_records_cache";
        let currentRecordsKey = localStorage.getItem(LAST_RECORDS_KEY) || "";
        let viewerRecords = [];
        const activeViewerRecords = new Map();

        function escapeHtml(value) {
            return String(value ?? "").replace(/[&<>"']/g, (char) => ({
                "&": "&amp;",
                "<": "&lt;",
                ">": "&gt;",
                '"': "&quot;",
                "'": "&#39;"
            }[char]));
        }

        function formatTime(value) {
            if (!value) return "在线中";
            const date = new Date(value);
            if (Number.isNaN(date.getTime())) return "未知";
            return date.toLocaleString("zh-CN", {
                year: "numeric",
                month: "2-digit",
                day: "2-digit",
                hour: "2-digit",
                minute: "2-digit",
                second: "2-digit",
                hour12: false
            }).replace(/\//g, "-");
        }

        function parseViewerInfo(viewerUid) {
            const p = viewerUid.split("|");
            return {
                osBrowser: p[1] || "未知",
                res: p[2] || "未知",
                dpr: p[3] || "1",
                net: p[4] || "未知",
                lang: p[5] || "zh",
                theme: p[6] || "light",
                uid: p[7] || "N/A",
                fp: p[8] || "N/A",
                visits: p[9] || "1"
            };
        }

        function buildInfoTags(info) {
            const safeNet = escapeHtml(String(info.net || "unknown").toUpperCase());
            const safeLang = escapeHtml(String(info.lang || "zh").toUpperCase());
            return `
                <span class="tag tag-uid">ID: ${escapeHtml(info.uid)}</span>
                <span class="tag tag-visits">第 ${escapeHtml(info.visits)} 次访问</span>
                <span class="tag tag-res">${escapeHtml(info.res)} @${escapeHtml(info.dpr)}x</span>
                <span class="tag tag-net">${safeNet}</span>
                <span class="tag">${safeLang}</span>
                <span class="tag">${info.theme === 'dark' ? '🌙' : '☀️'}</span>
                <span class="tag" title="指纹: ${escapeHtml(info.fp)}">FP: ${escapeHtml(info.fp)}</span>
            `;
        }

        function saveViewerRecords() {
            const cache = {
                recordsKey: currentRecordsKey,
                records: viewerRecords
            };
            localStorage.setItem(VIEWER_RECORDS_CACHE_KEY, JSON.stringify(cache));
            if (!currentRecordsKey) return;
            localStorage.setItem(currentRecordsKey, JSON.stringify(viewerRecords));
            localStorage.setItem(LAST_RECORDS_KEY, currentRecordsKey);
        }

        function loadSavedViewerRecords() {
            try {
                let saved = [];
                const cached = JSON.parse(localStorage.getItem(VIEWER_RECORDS_CACHE_KEY) || "null");
                if (cached && Array.isArray(cached.records)) {
                    saved = cached.records;
                    if (!currentRecordsKey && cached.recordsKey) {
                        currentRecordsKey = cached.recordsKey;
                    }
                } else if (currentRecordsKey) {
                    saved = JSON.parse(localStorage.getItem(currentRecordsKey) || "[]");
                }

                if (Array.isArray(saved)) {
                    viewerRecords = saved;
                    renderViewerRecords();
                }
            } catch (err) {
                console.warn("读取访客记录失败:", err);
            }
        }

        function renderViewerRecords() {
            const panel = document.getElementById("viewerRecordPanel");
            const container = document.getElementById("recordsContainer");
            if (!panel || !container) return;

            if (!viewerRecords.length) {
                container.innerHTML = '<div class="empty-state">暂无打开记录</div>';
                panel.style.display = currentRecordsKey ? "block" : "none";
                return;
            }

            panel.style.display = "block";
            container.innerHTML = viewerRecords.slice().reverse().map((record) => {
                const info = record.info || {};
                return `
                    <div class="record-item">
                        <div class="record-title">
                            <b style="color:#fff;">${escapeHtml(info.osBrowser || "未知设备")}</b>
                            <span class="tag">${record.endedAt ? "已结束" : "在线中"}</span>
                        </div>
                        <div class="record-meta">${buildInfoTags(info)}</div>
                        <div class="record-times">
                            <span class="tag">打开: ${escapeHtml(formatTime(record.openedAt))}</span>
                            <span class="tag">结束: ${escapeHtml(formatTime(record.endedAt))}</span>
                        </div>
                    </div>
                `;
            }).join("");
        }

        function appendActiveViewer(record) {
            const viewersContainer = document.getElementById('viewersContainer');
            if (!viewersContainer) return;

            const info = record.info;
            const el = document.createElement("div");
            el.className = "viewer-item";
            el.id = `viewer-${record.id}`;
            el.innerHTML = `
                <div class="viewer-main">
                    <div class="dot"></div>
                    <b style="color:#fff; margin-right:5px;">${escapeHtml(info.osBrowser)}</b>
                </div>
                <div class="viewer-details">
                    ${buildInfoTags(info)}
                    <span class="tag">打开 ${escapeHtml(formatTime(record.openedAt))}</span>
                </div>
            `;

            viewersContainer.appendChild(el);
        }

        function closeActiveViewerRecords() {
            if (!activeViewerRecords.size) return;
            const endedAt = new Date().toISOString();
            activeViewerRecords.forEach((record) => {
                if (!record.endedAt) record.endedAt = endedAt;
                const el = document.getElementById(`viewer-${record.id}`);
                if (el) el.remove();
            });
            activeViewerRecords.clear();
            saveViewerRecords();
            renderViewerRecords();
        }

        const sharePromptInput = document.getElementById('sharePromptInput');
        const savedSharePrompt = localStorage.getItem(SHARE_PROMPT_KEY);
        sharePromptInput.value = savedSharePrompt === null ? DEFAULT_SHARE_PROMPT : savedSharePrompt;
        if (savedSharePrompt === null) {
            localStorage.setItem(SHARE_PROMPT_KEY, DEFAULT_SHARE_PROMPT);
        }
        sharePromptInput.addEventListener('input', function() {
            localStorage.setItem(SHARE_PROMPT_KEY, this.value);
        });

        loadSavedViewerRecords();

        document.getElementById('clearRecordsBtn').onclick = () => {
            viewerRecords = Array.from(activeViewerRecords.values());
            if (viewerRecords.length) {
                saveViewerRecords();
            } else if (currentRecordsKey) {
                localStorage.removeItem(currentRecordsKey);
                localStorage.removeItem(LAST_RECORDS_KEY);
                localStorage.removeItem(VIEWER_RECORDS_CACHE_KEY);
                currentRecordsKey = "";
            }
            renderViewerRecords();
        };

        // 清晰度配置项 (升级版)
        const QUALITY_CONFIGS = {
            fluent: { width: 960, height: 540, frameRate: 15, bitrateMin: 500, bitrateMax: 1000 },
            standard: { width: 1280, height: 720, frameRate: 25, bitrateMin: 800, bitrateMax: 2000 },
            high: { width: 1920, height: 1080, frameRate: 30, bitrateMin: 1500, bitrateMax: 4000 },
            ultra: { width: 1920, height: 1080, frameRate: 60, bitrateMin: 2000, bitrateMax: 8000 },
            pro_2k: { width: 2560, height: 1440, frameRate: 30, bitrateMin: 3000, bitrateMax: 10000 }
        };
        let selectedQuality = "standard";

        // 清晰度选择逻辑
        document.querySelectorAll('#qualitySelector .control-item').forEach(item => {
            item.onclick = async () => {
                if (document.getElementById('generateBtn').disabled && !screenTrack) return; // 只有在未开始投屏时才禁用
                document.querySelectorAll('#qualitySelector .control-item').forEach(i => i.classList.remove('active'));
                item.classList.add('active');
                selectedQuality = item.getAttribute('data-q');

                // 如果正在投屏，动态应用新配置
                if (screenTrack) {
                    const config = QUALITY_CONFIGS[selectedQuality];
                    try {
                        await screenTrack.setEncoderConfiguration({
                            width: config.width,
                            height: config.height,
                            frameRate: config.frameRate,
                            bitrateMin: config.bitrateMin,
                            bitrateMax: config.bitrateMax
                        });
                        console.log("清晰度已动态切换为:", selectedQuality);
                    } catch (e) {
                        console.error("动态切换清晰度失败:", e);
                    }
                }
            };
        });

        // 时长选择逻辑
        let selectedDuration = 20;
        document.querySelectorAll('#durationSelector .control-item').forEach(item => {
            item.onclick = () => {
                if (document.getElementById('generateBtn').disabled && !screenTrack) return; // 只有在未开始投屏时才禁用
                document.querySelectorAll('#durationSelector .control-item').forEach(i => i.classList.remove('active'));
                item.classList.add('active');
                
                const val = item.getAttribute('data-v');
                if (val === 'custom') {
                    document.getElementById('customDurationBox').style.display = 'block';
                    selectedDuration = -1;
                } else {
                    document.getElementById('customDurationBox').style.display = 'none';
                    selectedDuration = parseInt(val);
                }

                // 如果正在投屏，动态更新/开启剩余时长
                if (client && client.connectionState === "CONNECTED") {
                    let newLimit = 0;
                    if (selectedDuration === -1) {
                        newLimit = parseInt(document.getElementById('customMinutesInput').value) || 30;
                    } else {
                        newLimit = selectedDuration;
                    }
                    
                    if (newLimit > 0) {
                        totalSecondsRemaining = newLimit * 60;
                        if (!countdownTimer) {
                            startCountdown(); // 重新启动计时器
                        }
                        console.log("时长已动态调整为:", newLimit, "分钟");
                    } else {
                        // 不限时长，清除定时器
                        if (countdownTimer) {
                            clearInterval(countdownTimer);
                            countdownTimer = null;
                        }
                        document.getElementById('status').innerText = "🟢 分享中 - 不限时长";
                    }
                }
            };
        });

        // 封装倒计时启动逻辑
        function startCountdown() {
            if (countdownTimer) clearInterval(countdownTimer);
            countdownTimer = setInterval(() => {
                totalSecondsRemaining--;
                if (totalSecondsRemaining <= 0) {
                    clearInterval(countdownTimer);
                    countdownTimer = null;
                    alert("分享时间已到，投屏已自动结束。");
                    cleanup().finally(() => window.location.reload());
                    return;
                }
                const h = String(Math.floor(totalSecondsRemaining / 3600)).padStart(2, '0');
                const m = String(Math.floor((totalSecondsRemaining % 3600) / 60)).padStart(2, '0');
                const s = String(totalSecondsRemaining % 60).padStart(2, '0');
                document.getElementById('status').innerText = `🟢 分享中 - 剩余时间 ${h}:${m}:${s}`;
            }, 1000);
        }

        // 自定义时长输入动态更新逻辑
        document.getElementById('customMinutesInput').addEventListener('input', function() {
            if (countdownTimer && selectedDuration === -1) {
                const newLimit = parseInt(this.value);
                if (newLimit > 0) {
                    totalSecondsRemaining = newLimit * 60;
                }
            }
        });

        document.getElementById('generateBtn').onclick = async () => {
            const btn = document.getElementById('generateBtn');
            const status = document.getElementById('status');

            // 环境检测：防止用户在本地打开文件时生成错误的本地链接
            if (window.location.protocol === 'file:') {
                alert("🔴 检测到您正在打开本地文件！\n\n请先访问您部署在 Render 的域名地址（例如 https://xxx.onrender.com/sharer.html），从线上页面点击分享，否则生成的链接别人无法打开。");
                return;
            }

            // 生成 4 位密码和随机房间 ID
            const password = String(Math.floor(1000 + Math.random() * 9000));
            const roomId = Math.random().toString(36).substring(7);
            const channel = `iosshare-${roomId}-${password}`;
            const sharePrompt = document.getElementById('sharePromptInput').value.trim();
            localStorage.setItem(SHARE_PROMPT_KEY, sharePrompt);

            try {
                btn.disabled = true;
                status.innerText = "正在请求共享权限...";

                client = AgoraRTC.createClient({ mode: "rtc", codec: "vp8" });

                // 应用选中的清晰度配置 (开启 detail 模式优化画质)
                const config = QUALITY_CONFIGS[selectedQuality];
                
                try {
                    screenTrack = await AgoraRTC.createScreenVideoTrack({
                        optimizationMode: "detail", // 优先保障文字细节
                        encoderConfig: {
                            width: config.width,
                            height: config.height,
                            frameRate: config.frameRate,
                            bitrateMin: config.bitrateMin,
                            bitrateMax: config.bitrateMax
                        }
                    }, "auto");
                } catch (trackError) {
                    console.error("Track Error:", trackError);
                    let msg = "权限请求失败";
                    if (trackError.code === "PERMISSION_DENIED") msg = "未获得屏幕共享权限，请点击允许";
                    else if (trackError.message?.includes("Could not get display media")) msg = "浏览器由于硬件压力或安全策略拒绝了请求";
                    throw new Error(msg);
                }

                await client.join(APP_ID, channel, null, "sharer");
                await client.publish(screenTrack);

                // 生成观看链接 (自适应当前部署域名，全网通用)
                const baseUrl = window.location.origin + window.location.pathname.replace('sharer.html', '');
                const hashParams = new URLSearchParams({ room: roomId, pwd: password });
                if (sharePrompt) hashParams.set("msg", sharePrompt);
                const watchUrl = `${baseUrl}index.html#${hashParams.toString()}`;

                currentRecordsKey = `sc_viewer_records_${roomId}_${password}`;
                activeViewerRecords.clear();
                saveViewerRecords();
                renderViewerRecords();

                document.getElementById('urlContainer').innerText = watchUrl;
                document.getElementById('pwdCode').innerText = password;
                document.getElementById('shareInfo').style.display = 'block';
                document.getElementById('viewerList').style.display = 'block';
                document.getElementById('viewerRecordPanel').style.display = 'block';

                const promptPreview = document.getElementById('promptPreview');
                if (sharePrompt) {
                    promptPreview.innerText = sharePrompt;
                    promptPreview.style.display = 'block';
                } else {
                    promptPreview.innerText = "";
                    promptPreview.style.display = 'none';
                }

                status.innerText = "🟢 分享中 - 请勿关闭此页面";

                // ===== 倒计时初始化 =====
                let limitMinutes = 0;
                if (selectedDuration === -1) {
                    limitMinutes = parseInt(document.getElementById('customMinutesInput').value) || 30;
                } else {
                    limitMinutes = selectedDuration;
                }

                if (limitMinutes > 0) {
                    totalSecondsRemaining = limitMinutes * 60;
                    startCountdown();
                } else {
                    document.getElementById('status').innerText = "🟢 分享中 - 不限时长";
                }

                btn.innerText = "停止投屏";
                btn.classList.add('active'); // 借用 active 样式使其变红或区分
                document.getElementById('sharePromptInput').disabled = true;
                btn.onclick = async () => {
                    await cleanup();
                    window.location.reload(); // 目前依然建议 reload 以确保 UI 状态完全重置
                };
                btn.disabled = false;

                document.getElementById('copyUrl').onclick = () => {
                    const text = sharePrompt
                        ? `${sharePrompt}\n\n使用浏览器打开，加入投屏：\n${watchUrl}`
                        : `使用浏览器打开，加入投屏：\n${watchUrl}`;
                    navigator.clipboard.writeText(text);
                    alert("邀请信息已复制");
                };

                // ===== 观众状态监听与透传解析 =====
                client.on("user-joined", (user) => {
                    // 如果 UID 不是通过我们特定编码格式传入的，则跳过
                    if (typeof user.uid !== 'string' || !user.uid.startsWith("viewer|")) return;
                    if (activeViewerRecords.has(user.uid)) return;

                    const record = {
                        id: `${Date.now()}-${Math.random().toString(36).slice(2, 8)}`,
                        agoraUid: user.uid,
                        info: parseViewerInfo(user.uid),
                        openedAt: new Date().toISOString(),
                        endedAt: null
                    };

                    viewerRecords.push(record);
                    activeViewerRecords.set(user.uid, record);
                    saveViewerRecords();
                    appendActiveViewer(record);
                    renderViewerRecords();
                });

                client.on("user-left", (user) => {
                    if (typeof user.uid !== 'string' || !user.uid.startsWith("viewer|")) return;
                    const record = activeViewerRecords.get(user.uid);
                    if (record && !record.endedAt) {
                        record.endedAt = new Date().toISOString();
                    }
                    activeViewerRecords.delete(user.uid);
                    saveViewerRecords();
                    renderViewerRecords();

                    const el = record ? document.getElementById(`viewer-${record.id}`) : null;
                    if (el) el.remove();
                });

                // 监听停止共享（点击浏览器顶部的停止或关闭窗口）
                screenTrack.on("track-ended", () => {
                    cleanup().finally(() => window.location.reload());
                });

            } catch (err) {
                console.error("Share Error:", err);
                status.innerText = `🔴 分享失败: ${err.message || '系统繁忙，请刷新再试'}`;
                btn.disabled = false;
                document.getElementById('sharePromptInput').disabled = false;
                if (screenTrack) {
                    screenTrack.stop();
                    screenTrack.close();
                }
                if (client) await client.leave().catch(() => {});
            }
        };

        // 统一资源回收逻辑
        async function cleanup() {
            closeActiveViewerRecords();
            if (screenTrack) {
                screenTrack.stop();
                screenTrack.close();
                screenTrack = null;
            }
            if (client) {
                await client.leave().catch(() => {});
                client = null;
            }
        }

        // 页面关闭/刷新前强制释放资源，防止崩溃或僵尸流
        window.onbeforeunload = () => {
            closeActiveViewerRecords();
            cleanup();
        };
    </script>
</body>

</html>
